<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaBank — Secure Banking System</title>
  <meta name="description" content="Enterprise-grade banking platform initialization — NexaBank" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ CANVAS ═══════════════════════════════════════ -->
  <canvas id="bankCanvas"></canvas>

  <!-- ═══════════════════════════════════════ UI OVERLAY ═══════════════════════════════════ -->
  <div id="uiOverlay">

    <!-- Logo / Brand -->
    <div id="brand">
      <div id="brandIcon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="38" height="38" rx="10" stroke="url(#g1)" stroke-width="1.5"/>
          <path d="M20 8L32 16V24L20 32L8 24V16L20 8Z" fill="url(#g2)" opacity="0.9"/>
          <path d="M20 13L27 17.5V26.5L20 31L13 26.5V17.5L20 13Z" fill="white" opacity="0.2"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#6B8DFF"/>
              <stop offset="1" stop-color="#8B5CF6"/>
            </linearGradient>
            <linearGradient id="g2" x1="8" y1="8" x2="32" y2="32">
              <stop stop-color="#4F6EF7"/>
              <stop offset="1" stop-color="#7C3AED"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span id="brandName">NexaBank</span>
    </div>



    <!-- Floating Decorative Cards -->
    <div class="floating-card" id="cardTopRight">
      <div class="card-shimmer"></div>
      <div class="card-chip">
        <div class="chip-line"></div>
        <div class="chip-line"></div>
        <div class="chip-line"></div>
      </div>
      <div class="card-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
      </div>
      <div class="card-brand">NexaBank</div>
      <div class="card-number">•••• •••• •••• 4251</div>
      <div class="card-details">
        <span>09/28</span>
        <span>CVV 774</span>
      </div>
      <div class="card-status">SYSTEM ACTIVE</div>
    </div>

    <div class="floating-card" id="cardBottomLeft">
      <div class="card-shimmer"></div>
      <div class="card-chip gold">
        <div class="chip-line"></div>
        <div class="chip-line"></div>
        <div class="chip-line"></div>
      </div>
      <div class="card-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="card-brand">AURA PRIME</div>
      <div class="card-number">PLATINUM ELITE</div>
      <div class="card-details">
        <span>INFINITY EDITION</span>
      </div>
      <div class="card-status">SECURE ACCESS</div>
    </div>

    <!-- Corner watermark -->
    <div id="cornerMark">NEXABANK OS v4.2.1 &nbsp;|&nbsp; BUILD 20260319</div>

  </div>



  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <!-- Main JS -->
  <script src="bank.js"></script>
</body>
</html>
